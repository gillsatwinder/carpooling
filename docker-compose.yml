version: "3.9"

services:

  # -----------------------
  # PostgreSQL Database
  # -----------------------
  postgres:
    image: postgres:16
    container_name: carpool_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studentcarpool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -----------------------
  # ASP.NET Core Backend
  # -----------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carpool_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=studentcarpool;Username=postgres;Password=postgres

  # -----------------------
  # Optional DB UI Tool
  # -----------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: carpool_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carpool.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: